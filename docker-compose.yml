version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: maram_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: maram_db
      POSTGRES_USER: maram_user
      POSTGRES_PASSWORD: maram_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:

{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block title %}{{ action }} ingénieur – Maram{% endblock %}
{% block page_title %}{{ action }} un ingénieur{% endblock %}
{% block content %}
<div class="pt-3" style="max-width:500px;">
  <div class="card border-0 shadow-sm">
    <div class="card-header bg-dark text-white py-2">
      <i class="bi bi-person me-2"></i><strong>{{ action }} un ingénieur</strong>
    </div>
    <div class="card-body">
      <form method="post">
        {% csrf_token %}
        {{ form|crispy }}
        <div class="d-flex gap-2 mt-3">
          <button type="submit" class="btn btn-primary"><i class="bi bi-save me-1"></i>Enregistrer</button>
          <a href="{% url 'engineer_list' %}" class="btn btn-outline-secondary">Annuler</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
